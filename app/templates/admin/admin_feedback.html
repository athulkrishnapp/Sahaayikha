{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <h2 class="mb-4">User Feedback</h2>

  <ul class="nav nav-tabs mb-3">
    <li class="nav-item">
        <a class="nav-link {% if current_filter == 'open' %}active{% endif %}" 
           href="{{ url_for('main.admin_feedbacks', filter='open') }}">
            Open
        </a>
    </li>
    <li class="nav-item">
        <a class="nav-link {% if current_filter == 'responded' %}active{% endif %}" 
           href="{{ url_for('main.admin_feedbacks', filter='responded') }}">
            Responded
        </a>
    </li>
  </ul>

  <div class="list-group">
    {% for fb in feedbacks %}
      <div class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
        <div>
          <strong>{{ fb.user.first_name }} {{ fb.user.last_name }}</strong>: {{ fb.message }}
        </div>
        <div class="d-flex gap-2">
            <form action="{{ url_for('main.admin_feedback_reply', feedback_id=fb.feedback_id) }}" method="POST" onsubmit="return confirm('Send a thank you notification to this user?');">
                <button type="submit" class="btn btn-sm btn-outline-success">Reply</button>
            </form>
            <form action="{{ url_for('main.admin_feedback_delete', feedback_id=fb.feedback_id) }}" method="POST" onsubmit="return confirm('Are you sure you want to delete this feedback?');">
                <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
            </form>
        </div>
      </div>
    {% else %}
      <div class="list-group-item text-center text-muted">No feedback in this category.</div>
    {% endfor %}
  </div>
</div>
{% endblock %}
