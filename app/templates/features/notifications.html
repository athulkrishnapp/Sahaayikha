{% extends "base.html" %}
{% block content %}
<div class="container py-4">
  <h2 class="mb-4">Notifications</h2>
  <ul class="list-group">
    {% for n in notifications %}
      <li class="list-group-item {% if n.status == 'Unread' %}bg-light fw-bold{% endif %}">
        <div class="d-flex justify-content-between align-items-center">
          <span>{{ n.message }}</span>
          <small class="text-muted">{{ n.sent_at.strftime('%Y-%m-%d %H:%M') }}</small>
        </div>
      </li>
    {% else %}
      <li class="list-group-item text-muted">No notifications.</li>
    {% endfor %}
  </ul>
</div>
{% endblock %}
